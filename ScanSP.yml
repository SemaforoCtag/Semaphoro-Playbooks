---
########################################################################
# 1) Linux (semaforos): escanear servicios/puertos → JSON → fetch      #
########################################################################
- name: Auditoria de Puertos y Servicios
  hosts: semaforos
  become: yes
  gather_facts: yes   # para tener inventory_hostname, SO, IP, etc.

  vars:
    ruta_json_remoto: "/tmp/info_servicios_{{ inventory_hostname }}.json"
    ruta_json_ctl:    "/home/semaphore/Excels"

  pre_tasks:
    - name: Crear carpeta local para los JSON
      ansible.builtin.file:
        path: "{{ ruta_json_ctl }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      run_once: true
      become: false

  tasks:
    - name: Capturar datos de red (PROTO | IP:PUERTO | PROCESO)
      ansible.builtin.shell: |
        ss -tunlp | grep LISTEN | awk '{print $1"|"$5"|"$7}'
      register: raw_network_data
      changed_when: false
      failed_when: false

    - name: Inicializar lista de servicios
      ansible.builtin.set_fact:
        servicios_lista: []

    - name: Procesar información de puertos y servicios
      ansible.builtin.set_fact:
        servicios_lista: >-
          {{
            servicios_lista +
            [{
              'protocolo': item.split('|')[0],
              'puerto':    item.split('|')[1].split(':')[-1],
              'proceso': (
                  item.split('"')[1]
                  if '"' in item
                  else (
                      item.split('|')[2]
                      if (item.split('|') | length) >= 3
                      else 'desconocido'
                  )
              )
            }]
          }}
      loop: "{{ raw_network_data.stdout_lines | default([]) }}"
      when:
        - raw_network_data.stdout_lines is defined
        - item.split('|') | length >= 2

    - name: DEBUG – Informe de servicios activos (opcional)
      ansible.builtin.debug:
        msg: |
          SERVICIOS EN {{ inventory_hostname }}:
          {% for svc in servicios_lista %}
          Proto: {{ '%-4s' | format(svc.protocolo) }}  Port: {{ '%-6s' | format(svc.puerto) }} -> Service: {{ svc.proceso }}
          {% endfor %}
      when: servicios_lista | length > 0

    - name: Guardar facts + servicios en JSON en el host
      ansible.builtin.copy:
        content: |
          {{
            ansible_facts
            | combine({
                'inventory_hostname': inventory_hostname,
                'servicios_lista': servicios_lista
              })
            | to_nice_json
          }}
        dest: "{{ ruta_json_remoto }}"
        force: yes

    - name: Traer JSON al nodo de control
      ansible.builtin.fetch:
        src: "{{ ruta_json_remoto }}"
        dest: "{{ ruta_json_ctl }}/"
        flat: true


########################################################################
# 2) Localhost: Procesar datos y generar Excel de Servicios DMZ        #
########################################################################
- name: Procesar datos y generar Excel de Servicios
  hosts: localhost
  gather_facts: no

  vars:
    ruta_json_ctl: "/home/semaphore/Excels"
    ruta_excel:    "/home/semaphore/Excels/Servicios_Servidores_DMZ.xlsx"
    script_python: "/home/semaphore/Excels/servicios_excel.py"
    venv_path:     "/home/semaphore/Excels/.venv_servicios"

  tasks:
    - name: Actualizar Script Python (Excel Servicios_Servidores_DMZ)
      ansible.builtin.copy:
        dest: "{{ script_python }}"
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import sys, os, json
          from openpyxl import Workbook, load_workbook
          from openpyxl.styles import Font, PatternFill, Alignment
          from openpyxl.worksheet.table import Table, TableStyleInfo

          CABECERAS = [
              "Hostname",
              "SO",
              "IP",
              "Protocolo",
              "Puerto",
              "Proceso"
          ]

          def crear_o_abrir_excel(ruta_excel):
              if os.path.exists(ruta_excel):
                  wb = load_workbook(ruta_excel)
                  ws = wb.active
                  # Comprobar si ya tiene cabeceras, si no, añadirlas
                  if ws.max_row == 0:
                      ws.title = "Servicios_DMZ"
                      ws.append(CABECERAS)
              else:
                  wb = Workbook()
                  ws = wb.active
                  ws.title = "Servicios_DMZ"
                  ws.append(CABECERAS)
              return wb, ws

          def aplicar_estilo_cabeceras(ws):
              header_fill = PatternFill(
                  start_color="FFD966",  # amarillo suave
                  end_color="FFD966",
                  fill_type="solid"
              )
              header_font = Font(bold=True)
              header_alignment = Alignment(horizontal="center", vertical="center")

              for cell in ws[1]:  # primera fila (cabecera)
                  cell.fill = header_fill
                  cell.font = header_font
                  cell.alignment = header_alignment

          def ajustar_anchos_columnas(ws):
              # calcular ancho máximo por columna
              col_widths = {}
              for row in ws.iter_rows(values_only=True):
                  for idx, value in enumerate(row, start=1):
                      if value is None:
                          continue
                      length = len(str(value))
                      if idx not in col_widths or length > col_widths[idx]:
                          col_widths[idx] = length

              for idx, width in col_widths.items():
                  col_letter = ws.cell(row=1, column=idx).column_letter
                  # pequeño margen para que no quede “pegado”
                  ws.column_dimensions[col_letter].width = width + 2

          def crear_o_actualizar_tabla(ws):
              """
              Crea o actualiza una tabla de Excel en toda el área de datos.
              Esto hace que sea más fácil filtrar y ver la info en Excel.
              """
              if ws.max_row < 2:
                  return  # no hay datos

              last_col = ws.max_column
              last_row = ws.max_row
              start_cell = "A1"
              end_cell = ws.cell(row=last_row, column=last_col).coordinate
              table_range = f"{start_cell}:{end_cell}"

              # Si ya existe una tabla, la eliminamos y la recreamos sobre el nuevo rango
              if ws._tables:
                  ws._tables = []  # asumimos solo una tabla

              table = Table(displayName="TablaServicios", ref=table_range)
              style = TableStyleInfo(
                  name="TableStyleMedium9",
                  showFirstColumn=False,
                  showLastColumn=False,
                  showRowStripes=True,
                  showColumnStripes=False
              )
              table.tableStyleInfo = style
              ws.add_table(table)

          def ordenar_por_hostname_puerto(ws):
              """
              Ordena las filas de datos por:
                1) Hostname (columna 1)
                2) Puerto (columna 5) numéricamente cuando se pueda
              """
              if ws.max_row < 2:
                  return  # solo cabecera o nada

              # Extraer todas las filas de datos (sin cabecera)
              data_rows = list(ws.iter_rows(min_row=2, values_only=True))

              def puerto_key(row):
                  # row[4] es la columna 5 (Puerto) en base 0
                  puerto_val = row[4]
                  if puerto_val is None:
                      return (1, "")  # que vaya al final
                  try:
                      # ordenar primero por flag 0 (numérico), luego por el valor
                      return (0, int(str(puerto_val)))
                  except ValueError:
                      # si no se puede convertir a int, lo tratamos como texto
                      return (1, str(puerto_val))

              # Ordenamos por Hostname y luego por Puerto
              # row[0] es Hostname (columna 1)
              data_rows.sort(key=lambda r: (str(r[0]), puerto_key(r)))

              # Borramos todas las filas de datos actuales (dejamos la cabecera)
              ws.delete_rows(2, ws.max_row - 1)

              # Insertamos de nuevo los datos ya ordenados
              for row in data_rows:
                  ws.append(row)

          def run():
              if len(sys.argv) != 3:
                  print(f"Uso: {sys.argv[0]} <ruta_excel> <ruta_json>")
                  sys.exit(1)

              ex_p, j_p = sys.argv[1], sys.argv[2]

              with open(j_p, 'r') as f:
                  data = json.load(f)

              hn = data.get('inventory_hostname', 'Desconocido')
              so = data.get("ansible_distribution", "") + " " + str(data.get("ansible_distribution_version", ""))
              ip = ""
              # Intentar sacar IP principal
              if "ansible_default_ipv4" in data and "address" in data["ansible_default_ipv4"]:
                  ip = data["ansible_default_ipv4"]["address"]

              servicios = data.get('servicios_lista', [])

              wb, ws = crear_o_abrir_excel(ex_p)

              # Añadir filas con los servicios
              for svc in servicios:
                  proto  = svc.get('protocolo', '')
                  puerto = svc.get('puerto', '')
                  proc   = svc.get('proceso', '')
                  ws.append([hn, so, ip, proto, puerto, proc])

              # Ordenar por Hostname y Puerto
              ordenar_por_hostname_puerto(ws)

              # Aplicar estilo cabeceras
              aplicar_estilo_cabeceras(ws)

              # Activar auto-filtros sobre todo el rango (cabecera + datos)
              if ws.max_row >= 1 and ws.max_column >= 1:
                  ws.auto_filter.ref = ws.dimensions

              # Congelar la primera fila de cabeceras
              ws.freeze_panes = "A2"

              # Ajustar ancho de columnas según contenido
              ajustar_anchos_columnas(ws)

              # Crear/actualizar tabla de Excel para hacer más visual y filtrable
              crear_o_actualizar_tabla(ws)

              wb.save(ex_p)

          if __name__ == "__main__":
              run()

    - name: Ejecutar script para cada JSON de servicios
      ansible.builtin.shell: |
        [ -d {{ venv_path }} ] || python3 -m venv {{ venv_path }}
        {{ venv_path }}/bin/pip install openpyxl --quiet
        for json_file in {{ ruta_json_ctl }}/info_servicios_*.json; do
          [ -f "$json_file" ] || continue
          {{ venv_path }}/bin/python {{ script_python }} {{ ruta_excel }} "$json_file"
        done
      args:
        executable: /bin/bash


##########################################################
# 3) Copiar Excel al recurso de red                      #
##########################################################
- name: Exportar Excel de Servicios a recurso de red
  hosts: localhost
  gather_facts: no

  vars:
    ruta_excel_src: "/home/semaphore/Excels/Servicios_Servidores_DMZ.xlsx"
    mountpoint: "/mnt/ansible_share"
    ruta_excel_dest: "/mnt/ansible_share/Servicios_Servidores_DMZ.xlsx"

  tasks:
    - name: Verificar que el recurso ya está montado
      ansible.builtin.stat:
        path: "{{ mountpoint }}"
      register: mount_status

    - name: Fallar si el recurso no está montado
      ansible.builtin.fail:
        msg: "❌ El recurso {{ mountpoint }} no está montado. Monta primero la carpeta en el sistema."
      when: not mount_status.stat.exists

    - name: Copiar Excel al Share
      become: true
      ansible.builtin.copy:
        src: "{{ ruta_excel_src }}"
        dest: "{{ ruta_excel_dest }}"
        mode: "0644"
        remote_src: true
