---
########################################################################
# 1) Linux (semaforos): escanear servicios/puertos → JSON → fetch      #
########################################################################
- name: Auditoria de Puertos y Servicios
  hosts: semaforos
  become: yes
  gather_facts: yes   # para tener ansible_hostname, SO, IP, etc.

  vars:
    ruta_json_remoto: "/tmp/info_servicios_{{ inventory_hostname }}.json"
    ruta_json_ctl:    "/home/semaphore/Excels"

  pre_tasks:
    - name: Crear carpeta local para los JSON
      ansible.builtin.file:
        path: "{{ ruta_json_ctl }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      run_once: true
      become: false

  tasks:
    - name: Capturar datos de red (PROTO | IP:PUERTO | PROCESO)
      ansible.builtin.shell: |
        ss -tunlp | grep LISTEN | awk '{print $1"|"$5"|"$7}'
      register: raw_network_data
      changed_when: false
      failed_when: false

    - name: Inicializar lista de servicios
      ansible.builtin.set_fact:
        servicios_lista: []

    - name: Procesar información de puertos y servicios
      ansible.builtin.set_fact:
        servicios_lista: >-
          {{
            servicios_lista +
            [{
              'protocolo': item.split('|')[0],
              'puerto':    item.split('|')[1].split(':')[-1],
              'proceso': (
                  item.split('"')[1]
                  if '"' in item
                  else (
                      item.split('|')[2]
                      if (item.split('|') | length) >= 3
                      else 'desconocido'
                  )
              )
            }]
          }}
      loop: "{{ raw_network_data.stdout_lines | default([]) }}"
      when:
        - raw_network_data.stdout_lines is defined
        - item.split('|') | length >= 2

    - name: DEBUG – Informe de servicios activos (opcional)
      ansible.builtin.debug:
        msg: |
          SERVICIOS EN {{ inventory_hostname }}:
          {% for svc in servicios_lista %}
          Proto: {{ '%-4s' | format(svc.protocolo) }}  Port: {{ '%-6s' | format(svc.puerto) }} -> Service: {{ svc.proceso }}
          {% endfor %}
      when: servicios_lista | length > 0

    - name: Guardar facts + servicios en JSON en el host
      ansible.builtin.copy:
    content: |
      {{
        ansible_facts
        | combine({
            'inventory_hostname': inventory_hostname,
            'ansible_hostname': ansible_hostname,
            'ansible_default_ipv4': ansible_default_ipv4,
            'servicios_lista': servicios_lista
          })
        | to_nice_json
      }}
    dest: "{{ ruta_json_remoto }}"
    force: yes

    - name: Traer JSON al nodo de control
      ansible.builtin.fetch:
        src: "{{ ruta_json_remoto }}"
        dest: "{{ ruta_json_ctl }}/"
        flat: true


########################################################################
# 2) Localhost: generar Excel “1 línea por host (Hostname/IP/SO)”      #
########################################################################
- name: Procesar datos y generar Excel de Servicios (Resumen por host)
  hosts: localhost
  gather_facts: no

  vars:
    ruta_json_ctl: "/home/semaphore/Excels"
    ruta_excel:    "/home/semaphore/Excels/Servicios_Servidores_DMZ.xlsx"
    script_python: "/home/semaphore/Excels/servicios_excel.py"
    venv_path:     "/home/semaphore/Excels/.venv_servicios"

  tasks:
    - name: Actualizar Script Python (Excel Servicios_Servidores_DMZ)
      ansible.builtin.copy:
        dest: "{{ script_python }}"
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import sys, os, json
          from glob import glob
          from openpyxl import Workbook
          from openpyxl.styles import Font, PatternFill, Alignment
          from openpyxl.worksheet.table import Table, TableStyleInfo

          # Columnas definitivas
          CABECERAS = [
              "Hostname",
              "IP",
              "SO",
              "Servicios"
          ]

          def extraer_facts(data):
              """
              Devuelve un dict con los facts de Ansible.
              Si los facts vienen anidados en 'ansible_facts', se usan esos;
              si no, se usan las claves del nivel superior.
              """
              if isinstance(data, dict) and "ansible_facts" in data and isinstance(data["ansible_facts"], dict):
                  return data["ansible_facts"]
              return data

          def cargar_datos_json(directorio_json):
              """
              Lee todos los info_servicios_*.json del directorio y
              devuelve un diccionario:
                host -> {
                    'ip': ...,
                    'so': ...,
                    'servicios': set((proto, puerto, proceso))
                }
              """
              patrones = [
                  os.path.join(directorio_json, "info_servicios_*.json"),
                  os.path.join(directorio_json, "info_servicios_*.JSON"),
              ]
              ficheros = []
              for p in patrones:
                  ficheros.extend(glob(p))

              hosts = {}

              for ruta in ficheros:
                  try:
                      with open(ruta, "r") as f:
                          data = json.load(f)
                  except Exception as e:
                      print(f"[WARN] No se pudo leer {ruta}: {e}")
                      continue

                  facts = extraer_facts(data)

                  # Preferimos el hostname real del sistema
                  hn = (
                      facts.get("ansible_hostname")
                      or facts.get("ansible_nodename")
                      or facts.get("inventory_hostname")
                      or data.get("inventory_hostname")
                      or "Desconocido"
                  )

                  # SO: distribución + versión si están disponibles
                  distro = facts.get("ansible_distribution", "") or ""
                  version = str(facts.get("ansible_distribution_version", "") or "")
                  so = (distro + " " + version).strip()

                  # IP principal si existe
                  ip = ""
                  default_ipv4 = facts.get("ansible_default_ipv4") or data.get("ansible_default_ipv4") or {}
                  if isinstance(default_ipv4, dict):
                      ip = default_ipv4.get("address", "")

                  servicios = data.get("servicios_lista", [])

                  if hn not in hosts:
                      hosts[hn] = {
                          "ip": ip,
                          "so": so,
                          "servicios": set()
                      }

                  # Por si el mismo host aparece en varios JSON y en uno viene el SO/IP mejor
                  if not hosts[hn]["ip"] and ip:
                      hosts[hn]["ip"] = ip
                  if not hosts[hn]["so"] and so:
                      hosts[hn]["so"] = so

                  for svc in servicios:
                      proto  = svc.get("protocolo", "")
                      puerto = svc.get("puerto", "")
                      proc   = svc.get("proceso", "")
                      hosts[hn]["servicios"].add((proto, str(puerto), proc))

              return hosts

          def crear_excel_resumen(ruta_excel, hosts):
              """
              Crea SIEMPRE un Excel nuevo con 1 línea por host.
              """
              wb = Workbook()
              ws = wb.active
              ws.title = "Servicios_por_Host"

              # Cabeceras
              ws.append(CABECERAS)

              # Filas: una por host
              for hostname in sorted(hosts.keys()):
                  info = hosts[hostname]
                  ip = info.get("ip", "")
                  so = info.get("so", "")

                  # Ordenamos servicios por puerto y luego proceso
                  servicios_ordenados = sorted(
                      list(info["servicios"]),
                      key=lambda x: (x[1], x[2])
                  )
                  # Formato: "tcp 22 (sshd), tcp 443 (nginx)"
                  servicios_str = ", ".join(
                      f"{proto} {puerto} ({proc})"
                      for proto, puerto, proc in servicios_ordenados
                  )

                  ws.append([hostname, ip, so, servicios_str])

              # Dar formato a cabeceras
              header_fill = PatternFill(
                  start_color="FFD966",
                  end_color="FFD966",
                  fill_type="solid"
              )
              header_font = Font(bold=True)
              header_alignment = Alignment(horizontal="center", vertical="center")

              for cell in ws[1]:
                  cell.fill = header_fill
                  cell.font = header_font
                  cell.alignment = header_alignment

              # Autofiltro
              if ws.max_row >= 1 and ws.max_column >= 1:
                  ws.auto_filter.ref = ws.dimensions

              # Congelar cabecera
              ws.freeze_panes = "A2"

              # Ajustar anchos de columna
              col_widths = {}
              for row in ws.iter_rows(values_only=True):
                  for idx, value in enumerate(row, start=1):
                      if value is None:
                          continue
                      length = len(str(value))
                      if idx not in col_widths or length > col_widths[idx]:
                          col_widths[idx] = length

              for idx, width in col_widths.items():
                  col_letter = ws.cell(row=1, column=idx).column_letter
                  ws.column_dimensions[col_letter].width = min(width + 2, 80)

              # Crear tabla para que se vea más chulo
              if ws.max_row >= 2:
                  last_col = ws.max_column
                  last_row = ws.max_row
                  start_cell = "A1"
                  end_cell = ws.cell(row=last_row, column=last_col).coordinate
                  table_range = f"{start_cell}:{end_cell}"

                  table = Table(displayName="TablaServiciosHost", ref=table_range)
                  style = TableStyleInfo(
                      name="TableStyleMedium9",
                      showFirstColumn=False,
                      showLastColumn=False,
                      showRowStripes=True,
                      showColumnStripes=False
                  )
                  table.tableStyleInfo = style
                  ws.add_table(table)

              wb.save(ruta_excel)

          def run():
              if len(sys.argv) != 3:
                  print(f"Uso: {sys.argv[0]} <ruta_excel> <directorio_json>")
                  sys.exit(1)

              ruta_excel = sys.argv[1]
              dir_json   = sys.argv[2]

              hosts = cargar_datos_json(dir_json)
              if not hosts:
                  print("[WARN] No se encontraron JSON de servicios.")
              crear_excel_resumen(ruta_excel, hosts)

          if __name__ == "__main__":
              run()

    - name: Ejecutar script agregando TODOS los JSON
      ansible.builtin.shell: |
        [ -d {{ venv_path }} ] || python3 -m venv {{ venv_path }}
        {{ venv_path }}/bin/pip install openpyxl --quiet
        {{ venv_path }}/bin/python {{ script_python }} {{ ruta_excel }} {{ ruta_json_ctl }}
      args:
        executable: /bin/bash


##########################################################
# 3) Copiar Excel al recurso de red                      #
##########################################################
- name: Exportar Excel de Servicios a recurso de red
  hosts: localhost
  gather_facts: no

  vars:
    ruta_excel_src: "/home/semaphore/Excels/Servicios_Servidores_DMZ.xlsx"
    mountpoint: "/mnt/ansible_share"
    ruta_excel_dest: "/mnt/ansible_share/Servicios_Servidores_DMZ.xlsx"

  tasks:
    - name: Verificar que el recurso ya está montado
      ansible.builtin.stat:
        path: "{{ mountpoint }}"
      register: mount_status

    - name: Fallar si el recurso no está montado
      ansible.builtin.fail:
        msg: "❌ El recurso {{ mountpoint }} no está montado. Monta primero la carpeta en el sistema."
      when: not mount_status.stat.exists

    - name: Copiar Excel al Share
      become: true
      ansible.builtin.copy:
        src: "{{ ruta_excel_src }}"
        dest: "{{ ruta_excel_dest }}"
        mode: "0644"
        remote_src: true
