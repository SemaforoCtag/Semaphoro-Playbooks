---
########################################################################
# 1. Extracción de Hardware Detallado en los Hosts                    #
########################################################################
- name: Auditoría Completa de Hardware
  hosts: semaforos
  gather_facts: yes
  become: true

  vars:
    ruta_json_remoto: "/tmp/hw_full_{{ inventory_hostname }}.json"
    ruta_json_ctl:    "/home/semaphore/Excels"

  tasks:
    - name: Extraer info detallada de RAM (Slots físicos)
      ansible.builtin.shell: |
        dmidecode -t memory | grep -E 'Capacity:|Size:|Locator:|Type:|Speed:|Manufacturer:' | grep -v "No Module Installed" || echo "Información no disponible"
      register: ram_detallada
      ignore_errors: yes

    - name: Listado de Discos Físicos (Excluyendo particiones)
      ansible.builtin.shell: "lsblk -J -o NAME,SIZE,MODEL,SERIAL,TYPE | grep -v 'loop'"
      register: discos_raw
      ignore_errors: yes

    - name: Generar Super JSON de Hardware
      ansible.builtin.copy:
        dest: "{{ ruta_json_remoto }}"
        content: |
          {
            "hostname": "{{ ansible_hostname }}",
            "ip": "{{ inventory_hostname }}",
            "os": "{{ ansible_distribution }} {{ ansible_distribution_version }}",
            "fabricante": "{{ ansible_system_vendor }}",
            "modelo": "{{ ansible_product_name }}",
            "sn": "{{ ansible_product_serial }}",
            "cpu": "{{ ansible_processor[2] if ansible_processor|length > 2 else ansible_processor[0] }}",
            "cores": {{ ansible_processor_vcpus }},
            "ram_gb": {{ (ansible_memtotal_mb / 1024) | round(2) }},
            "ram_slots": {{ ram_detallada.stdout_lines | to_json }},
            "discos": {{ discos_raw.stdout | default('{"blockdevices":[]}') }},
            "mac": "{{ ansible_default_ipv4.mac | default('N/A') }}"
          }

    - name: Descargar JSON al Nodo de Control
      ansible.builtin.fetch:
        src: "{{ ruta_json_remoto }}"
        dest: "{{ ruta_json_ctl }}/"
        flat: true

########################################################################
# 2. Generación del Reporte Excel en Localhost                        #
########################################################################
- name: Generar Reporte Excel Consolidado
  hosts: localhost
  gather_facts: no
  vars:
    ruta_json_ctl: "/home/semaphore/Excels"
    ruta_excel:    "/home/semaphore/Excels/Inventario_Hardware_Completo.xlsx"
    script_python: "/home/semaphore/Excels/generar_hw_excel.py"

  tasks:
    - name: Crear Directorio de Excels (si no existe)
      ansible.builtin.file:
        path: "{{ ruta_json_ctl }}"
        state: directory
        mode: '0755'

    - name: Crear Script Python de Procesamiento
      ansible.builtin.copy:
        dest: "{{ script_python }}"
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import sys, os, json, glob
          try:
              from openpyxl import Workbook
              from openpyxl.styles import Font, PatternFill, Alignment, Border, Side
          except ImportError:
              print("ERROR: Libreria openpyxl no instalada. Ejecute 'pip install openpyxl'")
              sys.exit(1)

          def run():
              excel_path, json_dir = sys.argv[1], sys.argv[2]
              json_files = glob.glob(os.path.join(json_dir, "hw_full_*.json"))
              
              if not json_files:
                  print(f"Error: No se encontraron archivos en {json_dir}")
                  sys.exit(1)

              wb = Workbook()
              ws = wb.active
              ws.title = "Hardware"

              # Estilos Visuales
              blue_fill = PatternFill(start_color="1F4E78", end_color="1F4E78", fill_type="solid")
              white_font = Font(color="FFFFFF", bold=True)
              border = Border(left=Side(style='thin'), right=Side(style='thin'), top=Side(style='thin'), bottom=Side(style='thin'))

              headers = ["HOSTNAME", "IP", "S.O.", "FABRICANTE", "MODELO", "Nº SERIE", "CPU", "CORES", "RAM GB", "DETALLE RAM", "DISCOS", "MAC"]
              ws.append(headers)
              for cell in ws[1]:
                  cell.fill, cell.font = blue_fill, white_font

              for f_path in sorted(json_files):
                  with open(f_path, 'r') as f:
                      d = json.load(f)
                  
                  # Formatear Discos
                  disks_list = []
                  for dev in d.get('discos', {}).get('blockdevices', []):
                      if dev.get('type') == 'disk':
                          disks_list.append(f"- {dev['name']}: {dev['size']} ({dev.get('model','Generic')})")
                  
                  row = [
                      d.get('hostname'), d.get('ip'), d.get('os'),
                      d.get('fabricante'), d.get('modelo'), d.get('sn'),
                      d.get('cpu'), d.get('cores'), d.get('ram_gb'),
                      "\n".join(d.get('ram_slots', [])),
                      "\n".join(disks_list),
                      d.get('mac')
                  ]
                  ws.append(row)
                  
                  # Aplicar bordes y ajuste de texto
                  for cell in ws[ws.max_row]:
                      cell.border = border
                      cell.alignment = Alignment(wrap_text=True, vertical="top")

              # Ajustar anchos de columna
              for i, col in enumerate(ws.columns, 1):
                  ws.column_dimensions[col[0].column_letter].width = 22
              ws.column_dimensions['J'].width = 50 # Detalle RAM
              ws.column_dimensions['K'].width = 40 # Discos

              wb.save(excel_path)
              print(f"OK: Excel generado en {excel_path}")

          if __name__ == "__main__":
              run()

    - name: Ejecutar script de Python
      ansible.builtin.command: "python3 {{ script_python }} {{ ruta_excel }} {{ ruta_json_ctl }}"
      register: py_res

    - name: Resultado de la generación
      ansible.builtin.debug:
        msg: "{{ py_res.stdout }}"

########################################################################
# 3. Mover al Recurso de Red (Opcional)                               #
########################################################################
- name: Exportar Reporte Final
  hosts: localhost
  tasks:
    - name: Copiar al Share de Red
      become: true
      ansible.builtin.copy:
        src: "/home/semaphore/Excels/Inventario_Hardware_Completo.xlsx"
        dest: "/mnt/ansible_share/Inventario_Hardware_Completo.xlsx"
        mode: "0644"
        remote_src: true
      ignore_errors: yes
