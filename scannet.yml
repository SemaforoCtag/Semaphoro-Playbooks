---
- name: Descubrimiento de Red (Solo equipos con SSH activo)
  hosts: localhost
  gather_facts: no
  become: yes

  vars:
    redes_a_escanear:
      - "10.49.1.0/24"
      - "10.49.3.0/24"
      - "10.57.3.0/24"
      - "10.50.3.0/24"
      - "10.56.12.0/24"
      - "10.57.2.0/24"
      
    ruta_json_temp: "/tmp/hosts_ssh_descubiertos.json"
    ruta_excel: "/home/semaphore/Excels/Reporte_Solo_SSH.xlsx"
    script_python: "/home/semaphore/Excels/generar_descubrimiento_excel.py"

  tasks:
    - name: Asegurar directorios de trabajo
      ansible.builtin.file:
        path: "/home/semaphore/Excels"
        state: directory
        mode: '0755'

    - name: Escaneo de puertos SSH (Filtrado estricto)
      ansible.builtin.shell: |
        # -sT: Escaneo de conexión TCP (muy fiable para SSH)
        # -Pn: No hace ping previo (escanea el puerto directamente)
        # -p 22: Solo mira el puerto SSH
        # --open: Reporta solo si el puerto está ABIERTO
        nmap -sT -Pn -p 22 {{ redes_a_escanear | join(' ') }} --open -oG - | grep "Host:" | awk '{
          ip=$2;
          name=$3;
          if (name == "()" || name == "") {
            print ip ";" ip
          } else {
            # Limpiar paréntesis del nombre si existen
            gsub(/[()]/, "", name);
            print name ";" ip
          }
        }' | sort -u
      register: hosts_encontrados

    - name: Crear JSON temporal
      ansible.builtin.copy:
        dest: "{{ ruta_json_temp }}"
        content: "{{ hosts_encontrados.stdout_lines | to_json }}"

    - name: Crear Script Python Dinámico
      ansible.builtin.copy:
        dest: "{{ script_python }}"
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import json, sys, os
          from openpyxl import Workbook
          from openpyxl.styles import Font, PatternFill, Alignment

          def obtener_rango_dinamico(ip):
              partes = ip.split('.')
              if len(partes) == 4:
                  return f"Rango {partes[0]}.{partes[1]}.{partes[2]}.x"
              return "IP no válida"

          def run():
              json_path, excel_path = sys.argv[1], sys.argv[2]
              if not os.path.exists(json_path): return
              
              with open(json_path, 'r') as f:
                  raw_hosts = json.load(f)

              wb = Workbook()
              ws = wb.active
              ws.title = "Equipos con SSH"

              headers = ["RANGO", "HOSTNAME / DNS", "IP"]
              ws.append(headers)
              
              header_fill = PatternFill(start_color="1F4E78", end_color="1F4E78", fill_type="solid")
              for cell in ws[1]:
                  cell.font = Font(bold=True, color="FFFFFF")
                  cell.fill = header_fill

              data_rows = []
              for item in raw_hosts:
                  if ';' not in item: continue
                  name, ip = item.split(';')
                  display_name = name if name != ip else "Sin DNS"
                  data_rows.append([obtener_rango_dinamico(ip), display_name, ip])
              
              # Ordenar por Rango e IP numéricamente
              try:
                  data_rows.sort(key=lambda x: (x[0], int(x[2].split('.')[-1])))
              except:
                  data_rows.sort()

              for row in data_rows:
                  ws.append(row)

              ws.column_dimensions['A'].width = 25
              ws.column_dimensions['B'].width = 40
              ws.column_dimensions['C'].width = 20
              wb.save(excel_path)

          if __name__ == "__main__":
              run()

    - name: Ejecutar generación de Excel
      ansible.builtin.command: "python3 {{ script_python }} {{ ruta_json_temp }} {{ ruta_excel }}"

    - name: Exportar Reporte a la Ruta de Red
      ansible.builtin.copy:
        src: "{{ ruta_excel }}"
        dest: "/mnt/ansible_share/Reporte_Equipos_SSH.xlsx"
        mode: "0666"
        remote_src: true
      ignore_errors: yes

    - name: Mostrar resumen
      ansible.builtin.debug:
        msg: "Se han encontrado {{ hosts_encontrados.stdout_lines | length }} equipos con SSH abierto."
