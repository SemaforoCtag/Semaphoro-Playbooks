---
- name: Descubrimiento Multirango y Generación de Inventario con Hostnames
  hosts: localhost
  gather_facts: no
  become: yes

  vars:
    redes_a_escanear:
      - "10.49.1.0/24"
      - "10.49.3.0/24"
      - "10.57.3.0/24"
    ruta_nuevo_inventario: "/home/semaphore/scannet.yml"

  tasks:
    - name: Asegurar que nmap está instalado
      ansible.builtin.package:
        name: nmap
        state: present

    - name: Escaneo masivo de rangos (Obteniendo IPs y Hostnames)
      ansible.builtin.shell: |
        # -sn: Ping scan (rápido)
        # -R: Forzar resolución DNS siempre
        nmap -sn -R {{ redes_a_escanear | join(' ') }} | grep "Nmap scan report for" | awk '{
          if (NF==6) 
            print $5 ";" $6
          else 
            print $5 ";" $5
        }' | tr -d '()'
      register: hosts_encontrados

    - name: Generar Inventario YAML Estático
      ansible.builtin.copy:
        dest: "{{ ruta_nuevo_inventario }}"
        content: |
          ---
          all:
            children:
              semaforos:
                hosts:
          {% for item in hosts_encontrados.stdout_lines %}
          {% set parts = item.split(';') %}
                  {{ parts[0] }}:
                    ansible_host: {{ parts[1] }}
          {% endfor %}
            vars:
              ansible_user: semaphore
              ansible_become: true

    - name: Mostrar Resumen de Hallazgos
      ansible.builtin.debug:
        msg: 
          - "Escaneo completado."
          - "Total hosts vivos: {{ hosts_encontrados.stdout_lines | length }}"

    - name: Validar sintaxis del nuevo inventario
      ansible.builtin.command: "ansible-inventory -i {{ ruta_nuevo_inventario }} --list"
      register: inventory_test
      ignore_errors: yes

    - name: Mostrar el contenido del inventario generado
      ansible.builtin.command: "cat {{ ruta_nuevo_inventario }}"
      register: inventario_final

    - name: Imprimir inventario en consola
      ansible.builtin.debug:
        var: inventario_final.stdout_lines
