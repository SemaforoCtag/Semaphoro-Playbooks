---
- name: Descubrimiento de Red Profesional (SSH Only - Sin Límites)
  hosts: localhost
  gather_facts: no
  become: yes

  vars:
    # Agrega aquí todas las redes que necesites
    redes_a_escanear:
      - "10.49.1.0/24"
      - "10.49.3.0/24"
      - "10.57.3.0/24"
      - "10.2.3.0/24"
    
      
    ruta_excel: "/home/semaphore/Excels/Reporte_Final_SSH.xlsx"
    ruta_share: "/mnt/ansible_share/Reporte_Final_SSH.xlsx"
    script_python: "/home/semaphore/Excels/motor_escaneo.py"

  tasks:
    - name: Asegurar que el directorio existe
      ansible.builtin.file:
        path: "/home/semaphore/Excels"
        state: directory
        mode: '0755'

    - name: Crear Motor de Escaneo y Generación de Excel (Python)
      ansible.builtin.copy:
        dest: "{{ script_python }}"
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import json, sys, os, subprocess, xml.etree.ElementTree as ET, tempfile
          from openpyxl import Workbook
          from openpyxl.styles import Font, PatternFill

          def obtener_rango(ip):
              partes = ip.split('.')
              return f"Rango {partes[0]}.{partes[1]}.{partes[2]}.x" if len(partes) == 4 else "IP Inválida"

          def escanear_red(red):
              print(f"Escaneando {red}...")
              temp_xml = tempfile.mktemp(suffix=".xml")
              # -sT: Escaneo TCP Connect (más fiable a través de firewalls y VPNs).
              # -T3: Velocidad normal (evita bloqueos que omiten rangos enteros).
              cmd = f"nmap -sT -Pn -p 22 -T3 --max-parallelism 10 {red} -oX {temp_xml}"
              resultado = subprocess.run(cmd, shell=True, capture_output=True, text=True)
              encontrados = []
              
              if not os.path.exists(temp_xml):
                  print(f"[!] Error: No se pudo generar XML para {red}. Nmap devolvió:\n{resultado.stderr}")
                  return encontrados

              try:
                  tree = ET.parse(temp_xml)
                  root = tree.getroot()
                  for host in root.findall('host'):
                      # Verificar si el puerto 22 está abierto
                      port_open = False
                      ports = host.find('ports')
                      if ports is not None:
                          for port in ports.findall('port'):
                              if port.get('portid') == '22':
                                  state = port.find('state')
                                  if state is not None and state.get('state') == 'open':
                                      port_open = True
                                      break
                      
                      if not port_open:
                          continue

                      # Si el puerto está abierto, extraemos la info
                      ip = ""
                      mac = "Oculta tras el Router (Capa 3)"
                      hostname = "Sin DNS"
                      
                      # Buscar IP y MAC
                      for address in host.findall('address'):
                          if address.get('addrtype') == 'ipv4':
                              ip = address.get('addr')
                          elif address.get('addrtype') == 'mac':
                              mac = address.get('addr')

                      if not ip:
                          continue

                      # Buscar Hostname
                      hostnames = host.find('hostnames')
                      if hostnames is not None:
                          hostname_elem = hostnames.find('hostname')
                          if hostname_elem is not None and hostname_elem.get('name'):
                              hostname = hostname_elem.get('name')
                      
                      encontrados.append([obtener_rango(ip), hostname, ip, mac])
              except ET.ParseError as e:
                  print(f"Error al parsear XML de nmap para la red {red}: {e}")
              finally:
                  if os.path.exists(temp_xml):
                      os.remove(temp_xml)

              return encontrados

          def run():
              redes = {{ redes_a_escanear | to_json }}
              excel_path = "{{ ruta_excel }}"

              todos_los_hosts = []
              for red in redes:
                  todos_los_hosts.extend(escanear_red(red))

              wb = Workbook()
              ws = wb.active
              ws.title = "Inventario SSH"

              # Estilo de cabecera
              ws.append(["RANGO", "HOSTNAME", "IP", "MAC"])
              header_fill = PatternFill(start_color="1F4E78", end_color="1F4E78", fill_type="solid")
              for cell in ws[1]:
                  cell.font = Font(bold=True, color="FFFFFF")
                  cell.fill = header_fill

              # Ordenar por rango y luego por el último octeto de la IP
              todos_los_hosts.sort(key=lambda x: (x[0], int(x[2].split('.')[-1]) if '.' in x[2] else 0))

              for row in todos_los_hosts:
                  ws.append(row)

              ws.column_dimensions['A'].width = 25
              ws.column_dimensions['B'].width = 35
              ws.column_dimensions['C'].width = 20
              ws.column_dimensions['D'].width = 20

              wb.save(excel_path)
              print(f"Proceso finalizado. Total hosts: {len(todos_los_hosts)}")

          if __name__ == "__main__":
              run()

    - name: Ejecutar Motor de Descubrimiento (Esto puede tardar unos minutos)
      ansible.builtin.command: "python3 {{ script_python }}"
      async: 1800  # Hasta 30 minutos de tiempo límite
      poll: 15

    - name: Copiar Reporte a la Ruta de Red
      ansible.builtin.copy:
        src: "{{ ruta_excel }}"
        dest: "{{ ruta_share }}"
        mode: "0666"
        remote_src: true
      ignore_errors: yes

    - name: Mensaje de Finalización
      ansible.builtin.debug:
        msg: "El reporte se ha generado correctamente en {{ ruta_share }}"
