---
- name: Descubrimiento de Red Profesional (SSH Only - Sin Límites)
  hosts: localhost
  gather_facts: no
  become: yes

  vars:
    # Agrega aquí todas las redes que necesites
    redes_a_escanear:
      - "10.49.3.0/24"
      - "10.57.3.0/24"
      - "10.57.1.0/24"
      - "10.57.4.0/24"
      
    ruta_excel: "/home/semaphore/Excels/Reporte_Final_SSH.xlsx"
    ruta_share: "/mnt/ansible_share/Reporte_Final_SSH.xlsx"
    script_python: "/home/semaphore/Excels/motor_escaneo.py"

  tasks:
    - name: Asegurar que el directorio existe
      ansible.builtin.file:
        path: "/home/semaphore/Excels"
        state: directory
        mode: '0755'

    - name: Crear Motor de Escaneo y Generación de Excel (Python)
      ansible.builtin.copy:
        dest: "{{ script_python }}"
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import json, sys, os, subprocess, xml.etree.ElementTree as ET, tempfile
          from openpyxl import Workbook
          from openpyxl.styles import Font, PatternFill

          def escanear_red(red):
              print(f"\n>>> PROCESANDO: {red}")
              fd, temp_xml = tempfile.mkstemp(suffix=".xml")
              os.close(fd)
              
              # -n: No DNS (rápido), -Pn: No ping, --open: Solo abiertos, -T4: Agresivo
              cmd = f"nmap -sT -Pn -p 22 --open -n -T4 --max-parallelism 100 {red} -oX {temp_xml}"
              
              encontrados = []
              try:
                  # Timeout de 10 min por red para que no bloquee el playbook
                  subprocess.run(cmd, shell=True, capture_output=True, text=True, timeout=600)
                  
                  if not os.path.exists(temp_xml) or os.path.getsize(temp_xml) == 0:
                      print(f"--- Sin respuesta en {red}")
                      return encontrados

                  tree = ET.parse(temp_xml)
                  root = tree.getroot()
                  for host in root.findall('host'):
                      ip = "Desconocida"
                      for addr in host.findall('address'):
                          if addr.get('addrtype') == 'ipv4':
                              ip = addr.get('addr')
                      
                      if ip != "Desconocida":
                          encontrados.append([f"Rango {red}", "N/A (No DNS)", ip, "Detectado"])
                  
                  print(f"--- Finalizado {red}. Hosts detectados: {len(encontrados)}")
              except Exception as e:
                  print(f"!!! Error en {red}: {e}")
              finally:
                  if os.path.exists(temp_xml):
                      os.remove(temp_xml)
              return encontrados

          def run():
              # Cargamos las redes que vienen de Ansible
              try:
                  redes = json.loads('{{ redes_a_escanear | to_json }}')
              except:
                  print("Error cargando la lista de redes")
                  return

              print(f"Iniciando escaneo de {len(redes)} redes...")
              resultados_totales = []
              
              for r in redes:
                  resultados_totales.extend(escanear_red(r))

              # Crear Excel
              wb = Workbook()
              ws = wb.active
              ws.title = "Inventario"
              ws.append(["RANGO", "HOSTNAME", "IP", "ESTADO"])
              
              if resultados_totales:
                  for fila in resultados_totales:
                      ws.append(fila)
              else:
                  ws.append(["N/A", "N/A", "No se encontró nada", "Vacio"])

              wb.save("{{ ruta_excel }}")
              print(f"PROCESO FINALIZADO. Total hosts en Excel: {len(resultados_totales)}")

          if __name__ == "__main__":
              run()

    - name: Ejecutar Motor de Descubrimiento
      ansible.builtin.command: "python3 {{ script_python }}"
      async: 2400
      poll: 10
      register: salida_motor

    - name: Mostrar resultado del script
      ansible.builtin.debug:
        var: salida_motor.stdout_lines

    - name: Copiar Reporte a la Ruta de Red
      ansible.builtin.copy:
        src: "{{ ruta_excel }}"
        dest: "{{ ruta_share }}"
        mode: "0666"
        remote_src: true
      ignore_errors: yes

    - name: Mensaje de Finalización
      ansible.builtin.debug:
        msg: "El reporte se ha generado correctamente en {{ ruta_share }}"
