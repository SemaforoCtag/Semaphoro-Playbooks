---
- name: Descubrimiento de Red Profesional (SSH Only - Sin Límites)
  hosts: localhost
  gather_facts: no
  become: yes

  vars:
    # Agrega aquí todas las redes que necesites
    redes_a_escanear:
      - "10.49.1.0/24"
      - "10.49.3.0/24"
      - "10.57.3.0/24"
      - "10.57.1.0/24"
      
    ruta_excel: "/home/semaphore/Excels/Reporte_Final_SSH.xlsx"
    ruta_share: "/mnt/ansible_share/Reporte_Final_SSH.xlsx"
    script_python: "/home/semaphore/Excels/motor_escaneo.py"

  tasks:
    - name: Asegurar que el directorio existe
      ansible.builtin.file:
        path: "/home/semaphore/Excels"
        state: directory
        mode: '0755'

    - name: Crear Motor de Escaneo y Generación de Excel (Python)
      ansible.builtin.copy:
        dest: "{{ script_python }}"
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import json, sys, os, subprocess, xml.etree.ElementTree as ET, tempfile
          from openpyxl import Workbook
          from openpyxl.styles import Font, PatternFill

          def obtener_rango(ip):
              partes = ip.split('.')
              return f"Rango {partes[0]}.{partes[1]}.{partes[2]}.x" if len(partes) == 4 else "IP Inválida"

          def escanear_red(red):
              print(f"Escaneando {red}...")
              # Usamos un nombre de archivo temporal basado en la red para evitar colisiones
              fd, temp_xml = tempfile.mkstemp(suffix=".xml")
              os.close(fd)
              
              # T4 y min-parallelism 20 para acelerar sin perder fiabilidad
              cmd = f"nmap -sT -Pn -p 22 --open -T4 --min-parallelism 20 {red} -oX {temp_xml}"
              resultado = subprocess.run(cmd, shell=True, capture_output=True, text=True)
              encontrados = []
              
              if not os.path.exists(temp_xml) or os.path.getsize(temp_xml) == 0:
                  return encontrados

              try:
                  tree = ET.parse(temp_xml)
                  root = tree.getroot()
                  for host in root.findall('host'):
                      ip = ""
                      mac = "Oculta (Capa 3 / Remota)"
                      hostname = "Sin DNS"
                      
                      # Buscar IP y MAC
                      for address in host.findall('address'):
                          if address.get('addrtype') == 'ipv4':
                              ip = address.get('addr')
                          elif address.get('addrtype') == 'mac':
                              mac = address.get('addr')

                      if not ip:
                          continue

                      # Buscar Hostname
                      hostnames = host.find('hostnames')
                      if hostnames is not None:
                          h_elem = hostnames.find('hostname')
                          if h_elem is not None:
                              hostname = h_elem.get('name')
                      
                      encontrados.append([obtener_rango(ip), hostname, ip, mac])
              except Exception as e:
                  print(f"Error procesando {red}: {e}")
              finally:
                  if os.path.exists(temp_xml):
                      os.remove(temp_xml)

              return encontrados

          def run():
              redes = {{ redes_a_escanear | to_json }}
              excel_path = "{{ ruta_excel }}"
              todos_los_hosts = []
              
              for red in redes:
                  todos_los_hosts.extend(escanear_red(red))

              if not todos_los_hosts:
                  print("No se encontraron hosts con el puerto 22 abierto.")
                  # Crear un excel vacío para evitar errores en tareas posteriores
                  todos_los_hosts = [["N/A", "No se detectaron hosts", "N/A", "N/A"]]

              wb = Workbook()
              ws = wb.active
              ws.title = "Inventario SSH"
              ws.append(["RANGO", "HOSTNAME", "IP", "MAC"])
              
              header_fill = PatternFill(start_color="1F4E78", end_color="1F4E78", fill_type="solid")
              for cell in ws[1]:
                  cell.font = Font(bold=True, color="FFFFFF")
                  cell.fill = header_fill

              # Ordenar por el último octeto de la IP de forma segura
              try:
                  todos_los_hosts.sort(key=lambda x: (x[0], int(x[2].split('.')[-1]) if '.' in x[2] and x[2][0].isdigit() else 0))
              except:
                  pass

              for row in todos_los_hosts:
                  ws.append(row)

              ws.column_dimensions['A'].width = 25
              ws.column_dimensions['B'].width = 35
              ws.column_dimensions['C'].width = 20
              ws.column_dimensions['D'].width = 20

              wb.save(excel_path)
              print(f"Excel guardado en {excel_path}. Total: {len(todos_los_hosts)}")

          if __name__ == "__main__":
              run()

    - name: Ejecutar Motor de Descubrimiento
      ansible.builtin.command: "python3 {{ script_python }}"
      async: 2400
      poll: 10
      register: salida_motor

    - name: Mostrar resultado del script
      ansible.builtin.debug:
        var: salida_motor.stdout_lines

    - name: Copiar Reporte a la Ruta de Red
      ansible.builtin.copy:
        src: "{{ ruta_excel }}"
        dest: "{{ ruta_share }}"
        mode: "0666"
        remote_src: true
      ignore_errors: yes

    - name: Mensaje de Finalización
      ansible.builtin.debug:
        msg: "El reporte se ha generado correctamente en {{ ruta_share }}"
