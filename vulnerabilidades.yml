---
- name: Escaneo de Seguridad Detallado (Versiones de Paquetes)
  hosts: semaforos
  gather_facts: yes
  become: true

  vars:
    ruta_json_ctl: "/home/semaphore/Excels"

  tasks:
    - name: (Debian/Ubuntu) Obtener versiones de seguridad
      ansible.builtin.shell: |
        apt-get update > /dev/null
        # Extraemos todo de una vez para evitar bucles lentos
        apt-get --just-print upgrade | grep -i security | awk '{print $2}' | uniq | xargs -I {} sh -c '
          echo "{};$(dpkg-query -W -f="\${Version}" {});$(apt-cache policy {} | grep "Candidate:" | awk "{print \$2}")"
        '
      register: vulns_debian
      when: ansible_os_family == "Debian"
      async: 300  # Permite que la tarea corra hasta 5 min
      poll: 5     # Revisa el estado cada 5 seg

    - name: (RHEL/CentOS/Rocky) Obtener detalles de seguridad optimizado
      ansible.builtin.shell: |
        # 1. Sacamos la lista de paquetes con updates de seguridad una sola vez
        dnf check-update --security -q | grep -E '^\S+' | awk '{print $1}' > /tmp/pkgs_list.txt
        
        # 2. Procesamos la información localmente
        while read pkg; do
            # Quitamos la arquitectura si viene pegada (ej: .x86_64)
            p_clean=$(echo $pkg | cut -d. -f1)
            current=$(rpm -q --queryformat '%{VERSION}-%{RELEASE}' $p_clean)
            candidate=$(dnf list updates $p_clean -q | grep "^$p_clean" | awk '{print $2}')
            echo "$p_clean;$current;$candidate"
        done < /tmp/pkgs_list.txt
      register: vulns_rhel
      when: ansible_os_family == "RedHat"
      async: 400
      poll: 10

    - name: Preparar lista enriquecida
      ansible.builtin.set_fact:
        lista_final: "{{ vulns_debian.stdout_lines if ansible_os_family == 'Debian' else (vulns_rhel.stdout_lines | default([])) }}"

    - name: Generar JSON por Host
      ansible.builtin.copy:
        dest: "/tmp/vuln_detailed_{{ inventory_hostname }}.json"
        content: |
          {
            "hostname": "{{ ansible_hostname }}",
            "ip": "{{ inventory_hostname }}",
            "os": "{{ ansible_distribution }} {{ ansible_distribution_version }}",
            "parches": {{ lista_final | to_json }}
          }

    - name: Descargar al Nodo de Control
      ansible.builtin.fetch:
        src: "/tmp/vuln_detailed_{{ inventory_hostname }}.json"
        dest: "{{ ruta_json_ctl }}/"
        flat: true

########################################################################
# GENERACIÓN DE EXCEL CON COMPARATIVA DE VERSIONES
########################################################################
- name: Generar Excel de Parches
  hosts: localhost
  gather_facts: no
  vars:
    ruta_json_ctl: "/home/semaphore/Excels"
    ruta_excel: "/home/semaphore/Excels/Plan_de_Actualizacion_Seguridad.xlsx"
    script_python: "/home/semaphore/Excels/generar_vuln_v2.py"

  tasks:
    - name: Crear Script Python V2 (Comparativo)
      ansible.builtin.copy:
        dest: "{{ script_python }}"
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import sys, os, json, glob
          from openpyxl import Workbook
          from openpyxl.styles import Font, PatternFill, Alignment, Border, Side

          def run():
              excel_path, json_dir = sys.argv[1], sys.argv[2]
              json_files = glob.glob(os.path.join(json_dir, "vuln_detailed_*.json"))
              
              wb = Workbook()
              ws = wb.active
              ws.title = "Plan de Parcheo"
              
              headers = ["HOSTNAME", "IP", "PAQUETE", "VERSIÓN ACTUAL", "VERSIÓN SEGURIDAD (Update)"]
              ws.append(headers)
              
              # Estilos
              header_fill = PatternFill(start_color="000000", end_color="000000", fill_type="solid")
              white_font = Font(color="FFFFFF", bold=True)
              border = Border(left=Side(style='thin'), right=Side(style='thin'), top=Side(style='thin'), bottom=Side(style='thin'))

              for cell in ws[1]:
                  cell.fill, cell.font = header_fill, white_font

              for f_path in sorted(json_files):
                  with open(f_path, 'r') as f:
                      d = json.load(f)
                  
                  for item in d.get('parches', []):
                      if ';' in item:
                          nombre, actual, nueva = item.split(';')
                          ws.append([d['hostname'], d['ip'], nombre, actual, nueva])
                          for cell in ws[ws.max_row]:
                              cell.border = border

              # Ajustar anchos
              for col in ['A','B','C','D','E']:
                  ws.column_dimensions[col].width = 25

              wb.save(excel_path)

          if __name__ == "__main__":
              run()

    - name: Ejecutar generación de Excel
      ansible.builtin.command: "python3 {{ script_python }} {{ ruta_excel }} {{ ruta_json_ctl }}"

    - name: Exportar al Share (CON SUDO)
      become: true
      ansible.builtin.copy:
        src: "{{ ruta_excel }}"
        dest: "/mnt/ansible_share/Plan_de_Actualizacion_Seguridad.xlsx"
        mode: "0666"
        remote_src: true
