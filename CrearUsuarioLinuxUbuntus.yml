---
- name: Crear usuario userAnsi con acceso SSH y privilegios sudo
  hosts: all
  gather_facts: yes  # Cambiado a 'yes' para detectar el grupo correcto automáticamente
  become: yes

  vars:
    usuario: userti
    clave_ssh_publica: |
      ssh-rsa  Ansible

  tasks:
    - name: Crear usuario {{ usuario }}
      ansible.builtin.user:
        name: "{{ usuario }}"
        state: present
        create_home: yes
        shell: /bin/bash
        comment: "Usuario creado con acceso SSH y privilegios sudo"
      register: user_creation_result

    - name: Crear directorio .ssh para el usuario
      ansible.builtin.file:
        path: "/home/{{ usuario }}/.ssh"
        state: directory
        mode: '0700'
        owner: "{{ usuario }}"
        group: "{{ usuario }}"
      when: user_creation_result.state == "present"

    - name: Agregar clave pública SSH al usuario
      ansible.builtin.authorized_key:
        user: "{{ usuario }}"
        state: present
        key: "{{ clave_ssh_publica }}"

    - name: Determinar el grupo administrativo (sudo/wheel)
      set_fact:
        admin_group: "{{ 'sudo' if ansible_os_family == 'Debian' else 'wheel' }}"

    - name: Agregar usuario {{ usuario }} al grupo administrativo
      ansible.builtin.user:
        name: "{{ usuario }}"
        groups: "{{ admin_group }}"
        append: yes
      ignore_errors: yes # Por si el grupo no existe en sistemas muy raros

    - name: Permitir a {{ usuario }} usar sudo sin contraseña
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ usuario }}"
        content: "{{ usuario }} ALL=(ALL) NOPASSWD: ALL\n"
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s' # Validación de seguridad
