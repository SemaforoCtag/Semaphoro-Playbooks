---
########################################################################
# 1. RECOGIDA DE SOFTWARE (Multi-OS)                                   #
########################################################################
- name: Auditoría de Software Instalado
  hosts: semaforos
  gather_facts: yes
  become: true

  vars:
    dir_excels: "/home/semaphore/Excels"
    ruta_json_remoto: "/tmp/software_{{ inventory_hostname }}.json"

  pre_tasks:
    - name: Limpiar entorno local
      delegate_to: localhost
      run_once: true
      become: false
      ansible.builtin.shell: "rm -f {{ dir_excels }}/software_*.json {{ dir_excels }}/*.xlsx"
      ignore_errors: yes

    - name: Asegurar carpeta local
      ansible.builtin.file:
        path: "{{ dir_excels }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      run_once: true

  tasks:
    - name: Listar software (RedHat/Rocky/CentOS)
      ansible.builtin.shell: "rpm -qa --queryformat '%{NAME} (%{VERSION})\n' | sort"
      register: sw_redhat
      when: ansible_os_family == "RedHat"

    - name: Listar software (Debian/Ubuntu)
      ansible.builtin.shell: "dpkg-query -W -f='${Package} (${Version})\n' | sort"
      register: sw_debian
      when: ansible_os_family == "Debian"

    - name: Consolidar lista
      ansible.builtin.set_fact:
        lista_sw: "{{ sw_redhat.stdout_lines if ansible_os_family == 'RedHat' else sw_debian.stdout_lines }}"

    - name: Crear JSON
      ansible.builtin.copy:
        dest: "{{ ruta_json_remoto }}"
        content: |
          {
            "ip": "{{ inventory_hostname }}",
            "hostname": "{{ ansible_hostname }}",
            "software": {{ lista_sw | to_json }}
          }

    - name: Descargar JSON al nodo control
      ansible.builtin.fetch:
        src: "{{ ruta_json_remoto }}"
        dest: "{{ dir_excels }}/"
        flat: true

########################################################################
# 2. GENERACIÓN DE EXCEL (Visualización Optimizada para Búsqueda)      #
########################################################################
- name: Crear Reporte Visual Pro
  hosts: localhost
  gather_facts: no
  vars:
    dir_excels: "/home/semaphore/Excels"
    ruta_excel: "/home/semaphore/Excels/Inventario_ProgramasSRV.xlsx"
    script_py: "/home/semaphore/Excels/generar_sw_excel.py"

  tasks:
    - name: Crear Script Python (Visual y Buscable)
      ansible.builtin.copy:
        dest: "{{ script_py }}"
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import sys, os, json, glob
          from openpyxl import Workbook
          from openpyxl.styles import Font, PatternFill, Alignment, Border, Side

          def run():
              ex_path, j_dir = sys.argv[1], sys.argv[2]
              j_files = glob.glob(os.path.join(j_dir, "software_*.json"))
              wb = Workbook(); ws = wb.active; ws.title = "Software por Servidor"

              # Colores
              blue_header = PatternFill(start_color="2C3E50", end_color="2C3E50", fill_type="solid")
              white_font = Font(color="FFFFFF", bold=True, size=12)
              border = Border(left=Side(style='thin'), right=Side(style='thin'), top=Side(style='thin'), bottom=Side(style='thin'))

              headers = ["DIRECCIÓN IP", "HOSTNAME / NOMBRE", "SOFTWARE Y VERSIONES DETECTADAS"]
              ws.append(headers)
              
              # Estilo cabecera e inmovilización
              ws.freeze_panes = "A2"
              for cell in ws[1]:
                  cell.fill, cell.font, cell.alignment = blue_header, white_font, Alignment(horizontal="center")

              for f in sorted(j_files):
                  with open(f, 'r') as file:
                      d = json.load(file)
                  
                  sw_text = "\n".join(d.get('software', []))
                  ws.append([d.get('ip'), d.get('hostname'), sw_text])
                  
                  curr_row = ws.max_row
                  # Estilo de celdas de datos
                  for cell in ws[curr_row]:
                      cell.border = border
                      cell.alignment = Alignment(vertical="top", wrap_text=(cell.column == 3))
                      # Color alterno para identificar bloques de servidores
                      if curr_row % 2 == 0:
                          cell.fill = PatternFill(start_color="F2F4F4", end_color="F2F4F4", fill_type="solid")

              # Ajuste de anchos para facilitar la vista
              ws.column_dimensions['A'].width = 20
              ws.column_dimensions['B'].width = 30
              ws.column_dimensions['C'].width = 110 # Muy ancho para lectura cómoda
              
              # Activar autofiltros (crucial para buscar)
              ws.auto_filter.ref = ws.dimensions
              wb.save(ex_path)

          if __name__ == "__main__":
              run()

    - name: Generar Excel
      ansible.builtin.command: "python3 {{ script_py }} {{ ruta_excel }} {{ dir_excels }}"

########################################################################
# 3. EXPORTACIÓN                                                       #
########################################################################
- name: Publicar Resultados
  hosts: localhost
  tasks:
    - name: Copiar al Share
      become: true
      ansible.builtin.copy:
        src: "/home/semaphore/Excels/Inventario_ProgramasSRV.xlsx"
        dest: "/mnt/ansible_share/Inventario_ProgramasSRV.xlsx"
        mode: "0644"
        remote_src: true
