---
########################################################################
# 1. Linux (semaforos): facts + PUERTOS → JSON → fetch al nodo control #
########################################################################
- name: Recoger facts y escanear puertos
  hosts: semaforos
  gather_facts: yes
  become: true

  vars:
    ruta_json_remoto: "/tmp/info_{{ inventory_hostname }}.json"
    ruta_json_ctl:    "/home/semaphore/Excels"

  pre_tasks:
    - name: Limpiar datos antiguos para evitar duplicados
      delegate_to: localhost
      run_once: true
      become: false
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ ruta_json_ctl }}"
        - "/home/semaphore/Excels/Inventario_Equipos_DMZ.xlsx"

    - name: Crear carpeta local para los JSON
      ansible.builtin.file:
        path: "{{ ruta_json_ctl }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      run_once: true
      become: false

  tasks:
    # 1A) Escaneo de PUERTOS de bases de datos
    - name: Verificar MySQL (3306)
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 3306
        timeout: 2
      register: mysql_port
      ignore_errors: yes

    - name: Verificar PostgreSQL (5432)
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 5432
        timeout: 2
      register: postgres_port
      ignore_errors: yes

    - name: Verificar SQL Server (1433)
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 1433
        timeout: 2
      register: sqlserver_port
      ignore_errors: yes

    - name: Verificar Oracle (1521)
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 1521
        timeout: 2
      register: oracle_port
      ignore_errors: yes

    - name: Verificar MongoDB (27017)
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 27017
        timeout: 2
      register: mongodb_port
      ignore_errors: yes

    - name: Consolidar resultado de puertos DB
      ansible.builtin.set_fact:
        puertos_db:
          mysql: "{{ 'SI' if mysql_port is defined and not mysql_port.failed else '-' }}"
          postgresql: "{{ 'SI' if postgres_port is defined and not postgres_port.failed else '-' }}"
          sqlserver: "{{ 'SI' if sqlserver_port is defined and not sqlserver_port.failed else '-' }}"
          oracle: "{{ 'SI' if oracle_port is defined and not oracle_port.failed else '-' }}"
          mongodb: "{{ 'SI' if mongodb_port is defined and not mongodb_port.failed else '-' }}"

    - name: Obtener puertos TCP/UDP en escucha (ss)
      ansible.builtin.shell: "ss -lntuH | awk '{print $5}' | awk -F':' '{print $NF}' | sort -n | uniq | xargs"
      register: listening_ports_cmd

    - name: Guardar facts + puertos en JSON
      ansible.builtin.copy:
        dest: "{{ ruta_json_remoto }}"
        content: |
          {
            "ip": "{{ inventory_hostname }}",
            "hostname": "{{ ansible_hostname }}",
            "os": "{{ ansible_os_family }} {{ ansible_distribution_version }}",
            "fecha": "{{ ansible_date_time.date }} {{ ansible_date_time.time }}",
            "puertos_db": {{ puertos_db | to_json }},
            "listening_ports": "{{ listening_ports_cmd.stdout }}"
          }

    - name: Traer JSON al nodo de control
      ansible.builtin.fetch:
        src: "{{ ruta_json_remoto }}"
        dest: "{{ ruta_json_ctl }}/"
        flat: true

########################################################################
# 2. Localhost: Generar Excel ÚNICO y VISUAL                           #
########################################################################
- name: Generar Excel Profesional
  hosts: localhost
  gather_facts: no
  vars:
    ruta_json_ctl: "/home/semaphore/Excels"
    ruta_excel:    "/home/semaphore/Excels/Inventario_Equipos_DMZ.xlsx"
    script_python: "/home/semaphore/Excels/generar_excel.py"

  tasks:
    - name: Crear Script Python de Consolidación Visual
      ansible.builtin.copy:
        dest: "{{ script_python }}"
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import sys, os, json, glob
          from openpyxl import Workbook
          from openpyxl.styles import Font, PatternFill, Alignment, Border, Side

          def run():
              excel_path = sys.argv[1]
              json_files = glob.glob(os.path.join(sys.argv[2], "info_*.json"))
              wb = Workbook()
              ws = wb.active
              ws.title = "Inventario DMZ"

              # Estilos
              color_header = PatternFill(start_color="2C3E50", end_color="2C3E50", fill_type="solid")
              color_zebra = PatternFill(start_color="F2F4F4", end_color="F2F4F4", fill_type="solid")
              font_white = Font(color="FFFFFF", bold=True)
              border = Border(left=Side(style='thin'), right=Side(style='thin'), top=Side(style='thin'), bottom=Side(style='thin'))

              headers = ["IP SERVIDOR", "HOSTNAME", "SISTEMA OP.", "FECHA ESCANEO", "MYSQL", "POSTGRES", "SQLSERV", "ORACLE", "MONGO", "TODOS LOS PUERTOS"]
              ws.append(headers)
              for cell in ws[1]:
                  cell.fill, cell.font, cell.alignment = color_header, font_white, Alignment(horizontal="center")

              for f_path in sorted(json_files):
                  with open(f_path, 'r') as f:
                      d = json.load(f)
                  pdb = d.get('puertos_db', {})
                  row = [
                      d.get('ip'), d.get('hostname'), d.get('os'), d.get('fecha'),
                      pdb.get('mysql'), pdb.get('postgresql'), pdb.get('sqlserver'),
                      pdb.get('oracle'), pdb.get('mongodb'), d.get('listening_ports')
                  ]
                  ws.append(row)
                  curr = ws.max_row
                  for cell in ws[curr]:
                      cell.border = border
                      cell.alignment = Alignment(horizontal="center")
                      if curr % 2 == 0: cell.fill = color_zebra
              
              for col in ws.columns:
                  ws.column_dimensions[col[0].column_letter].width = 20
              ws.column_dimensions['J'].width = 50
              wb.save(excel_path)

          if __name__ == "__main__":
              run()

    - name: Ejecutar script Python una sola vez
      ansible.builtin.command: "python3 {{ script_python }} {{ ruta_excel }} {{ ruta_json_ctl }}"

########################################################################
# 3. Exportación al Recurso de Red                                     #
########################################################################
- name: Copiar archivos al Share
  hosts: localhost
  tasks:
    - name: Verificar montaje y copiar
      become: true
      ansible.builtin.copy:
        src: "/home/semaphore/Excels/Inventario_Equipos_DMZ.xlsx"
        dest: "/mnt/ansible_share/Inventario_Equipos_DMZ.xlsx"
        mode: "0644"
        remote_src: true
