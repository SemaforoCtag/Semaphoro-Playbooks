---
########################################################################
# 1. Linux (semaforos): facts + PUERTOS → JSON → fetch al nodo control #
########################################################################
- name: Recoger facts y escanear puertos
  hosts: semaforos
  gather_facts: yes
  become: true

  vars:
    ruta_json_remoto: "/tmp/info_{{ inventory_hostname }}.json"
    ruta_json_ctl: "/home/semaphore/Excels"

  pre_tasks:
    - name: Crear carpeta local para los JSON
      ansible.builtin.file:
        path: "{{ ruta_json_ctl }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      run_once: true
      become: false

    - name: Limpiar JSON antiguos (evita filas basura)
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      delegate_to: localhost
      run_once: true
      become: false
      loop: "{{ lookup('ansible.builtin.fileglob', ruta_json_ctl + '/info_*.json', wantlist=True) }}"

  tasks:
    - name: Escaneo de Puertos Base de Datos
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: "{{ item }}"
        timeout: 2
      register: db_ports
      ignore_errors: yes
      loop: [3306, 5432, 1433, 1521, 27017]

    - name: Obtener puertos TCP/UDP
      ansible.builtin.shell: |
        ss -lntuH | awk '{print $5}' | awk -F':' '{print $NF}' | sort -n | uniq
      register: listening_ports_cmd
      changed_when: false

    - name: Obtener modelo CPU
      ansible.builtin.shell: |
        grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | sed 's/^[ \t]*//'
      register: cpu_model_detailed
      changed_when: false

    - name: Obtener usuarios
      ansible.builtin.shell: |
        getent passwd | cut -d: -f1 | while read u; do echo "$u:$(id -Gn $u | tr ' ' ',')"; done
      register: lista_usuarios_detallada
      changed_when: false

