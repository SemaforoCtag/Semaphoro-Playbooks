---
########################################################################
# 1. Linux (semaforos): facts + PUERTOS → JSON → fetch al nodo control #
########################################################################
- name: Recoger facts y escanear puertos
  hosts: semaforos
  gather_facts: yes
  become: true

  vars:
    ruta_json_remoto: "/tmp/info_{{ inventory_hostname }}.json"
    ruta_json_ctl: "/home/semaphore/Excels"

  pre_tasks:
    - name: Crear carpeta local para los JSON
      file:
        path: "{{ ruta_json_ctl }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      run_once: true
      become: false

  tasks:
    - name: Verificar MySQL (3306)
      wait_for:
        host: "{{ inventory_hostname }}"
        port: 3306
        timeout: 4
      register: mysql_port
      ignore_errors: yes

    - name: Verificar PostgreSQL (5432)
      wait_for:
        host: "{{ inventory_hostname }}"
        port: 5432
        timeout: 4
      register: postgres_port
      ignore_errors: yes

    - name: Verificar SQL Server (1433)
      wait_for:
        host: "{{ inventory_hostname }}"
        port: 1433
        timeout: 4
      register: sqlserver_port
      ignore_errors: yes

    - name: Verificar Oracle (1521)
      wait_for:
        host: "{{ inventory_hostname }}"
        port: 1521
        timeout: 4
      register: oracle_port
      ignore_errors: yes

    - name: Verificar MongoDB (27017)
      wait_for:
        host: "{{ inventory_hostname }}"
        port: 27017
        timeout: 4
      register: mongodb_port
      ignore_errors: yes

    - name: Consolidar resultado de puertos DB
      set_fact:
        puertos_db:
          mysql:      "{{ mysql_port.elapsed is defined and mysql_port.elapsed < 3 }}"
          postgresql: "{{ postgres_port.elapsed is defined and postgres_port.elapsed < 3 }}"
          sqlserver:  "{{ sqlserver_port.elapsed is defined and sqlserver_port.elapsed < 3 }}"
          oracle:     "{{ oracle_port.elapsed is defined and oracle_port.elapsed < 3 }}"
          mongodb:    "{{ mongodb_port.elapsed is defined and mongodb_port.elapsed < 3 }}"

    - name: Obtener puertos TCP/UDP en escucha
      shell: ss -lntuH | awk '{print $5}' | awk -F':' '{print $NF}' | sort -n | uniq
      register: listening_ports_cmd
      changed_when: false
      failed_when: false

    - name: Obtener usuarios
      shell: getent passwd | awk -F: '{print $1 ":" $3 ":" $4 ":" $7}'
      register: usuarios
      changed_when: false

    - name: Guardar facts + puertos en JSON
      copy:
        dest: "{{ ruta_json_remoto }}"
        force: yes
        content: |
          {
            "inventory_hostname": "{{ inventory_hostname }}",
            "hostname": "{{ ansible_hostname }}",
            "os": "{{ ansible_distribution }} {{ ansible_distribution_version }}",
