---
########################################################################
# 1. Linux (semaforos): facts + PUERTOS → JSON → fetch al nodo control #
########################################################################
- name: Recoger facts y escanear puertos
  hosts: semaforos
  gather_facts: yes
  become: true

  vars:
    ruta_json_remoto: "/tmp/info_{{ inventory_hostname }}.json"
    ruta_json_ctl: "/home/semaphore/Excels"

  pre_tasks:
    - name: Crear carpeta local para los JSON
      file:
        path: "{{ ruta_json_ctl }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      run_once: true
      become: false

    - name: Limpiar JSON antiguos en el nodo de control
      file:
        path: "{{ item.path }}"
        state: absent
      delegate_to: localhost
      run_once: true
      with_fileglob:
        - "{{ ruta_json_ctl }}/info_*.json"

  tasks:
    ####################################################################
    # 1A) Comprobación de puertos de bases de datos
    ####################################################################
    - name: Verificar puertos DB
      wait_for:
        host: "{{ inventory_hostname }}"
        port: "{{ item.port }}"
        timeout: 3
      register: db_scan
      ignore_errors: yes
      loop:
        - { name: mysql,      port: 3306 }
        - { name: postgresql, port: 5432 }
        - { name: sqlserver,  port: 1433 }
        - { name: oracle,     port: 1521 }
        - { name: mongodb,    port: 27017 }

    - name: Consolidar resultado de puertos DB
      set_fact:
        puertos_db: >-
          {{
            dict(
              db_scan.results
              | map(attribute='item.name')
              | zip(
                  db_scan.results
                  | map(attribute='elapsed')
                  | map('default', 99)
                  | map('float')
                  | map('lt', 3)
                )
            )
          }}

    ####################################################################
    # 1B) Puertos en escucha
    ####################################################################
    - name: Obtener puertos TCP/UDP en escucha
      shell: ss -lntuH | awk '{print $5}' | awk -F':' '{print $NF}' | sort -n | uniq
      register: listening_ports_cmd
      changed_when: false
      failed_when: false

    - name: Definir lista de puertos
      set_fact:
        listening_ports: "{{ listening_ports_cmd.stdout_lines | default([]) }}"

