##########################################################
# 1) Recoger TODOS los usuarios y sus Grupos             #
##########################################################
- name: Recoger usuarios y permisos
  hosts: semaforos
  gather_facts: yes
  become: true
  vars:
    ruta_json_remoto: "/tmp/info_{{ inventory_hostname }}.json"
    ruta_json_ctl:    "/home/semaphore/Excels"

  pre_tasks:
    - name: Limpieza inicial de JSONs
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      with_fileglob: ["{{ ruta_json_ctl }}/info_*.json"]
      delegate_to: localhost
      run_once: true
      become: false

    - name: Eliminar Excel anterior para generar uno nuevo limpio
      ansible.builtin.file:
        path: "/home/semaphore/Excels/Inventario_Usuarios_Completo.xlsx"
        state: absent
      delegate_to: localhost
      run_once: true

  tasks:
    - name: Detectar SO
      ansible.builtin.set_fact:
        es_windows: "{{ ansible_os_family == 'Windows' }}"

    - name: Linux - Obtener usuarios y grupos
      when: not es_windows
      ansible.builtin.shell: |
        for u in $(cut -d: -f1 /etc/passwd); do
          groups_list=$(id -Gn $u | tr ' ' ',')
          echo "$u:$groups_list"
        done
      register: datos_linux
      changed_when: false

    - name: Windows - Obtener usuarios y grupos
      when: es_windows
      ansible.windows.win_shell: |
        Get-LocalUser | ForEach-Object {
            $name = $_.Name
            $groups = (Get-LocalGroup | Where-Object { (Get-LocalGroupMember -Group $_.Name).Name -contains "$env:COMPUTERNAME\$name" }).Name
            "$name:$($groups -join ',')"
        }
      register: datos_windows
      changed_when: false

    - name: Generar JSON con Timestamp
      ansible.builtin.copy:
        dest: "{{ ruta_json_remoto }}"
        content: |
          {
            "inventory_hostname": "{{ inventory_hostname }}",
            "fecha_escaneo": "{{ ansible_date_time.date }} {{ ansible_date_time.time }}",
            "datos": {{ (es_windows | ternary(datos_windows.stdout_lines, datos_linux.stdout_lines)) | to_json }}
          }

    - name: Descargar JSON al controlador
      ansible.builtin.fetch:
        src: "{{ ruta_json_remoto }}"
        dest: "{{ ruta_json_ctl }}/"
        flat: true

##########################################################
# 2) Localhost: Crear Excel VISUAL                      #
##########################################################
- name: Procesar datos y generar Excel
  hosts: localhost
  gather_facts: no
  vars:
    ruta_json_ctl: "/home/semaphore/Excels"
    ruta_excel:    "/home/semaphore/Excels/Inventario_Usuarios_Completo.xlsx"
    script_python: "/home/semaphore/Excels/append_excel2.py"
    venv_path:      "/home/semaphore/Excels/.venv"

  tasks:
    - name: Actualizar Script Python (NUEVO DISEÑO VISUAL)
      ansible.builtin.copy:
        dest: "{{ script_python }}"
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import sys, os, json
          from openpyxl import Workbook, load_workbook
          from openpyxl.styles import Font, PatternFill, Alignment, Border, Side

          def run():
              ex_p, j_p = sys.argv[1], sys.argv[2]
              with open(j_p, 'r') as f:
                  data = json.load(f)
              
              hn = data.get('inventory_hostname', 'Desconocido')
              fecha = data.get('fecha_escaneo', 'N/A')
              filas = data.get('datos', [])

              # --- CONFIGURACIÓN DE ESTILOS ---
              color_server = PatternFill(start_color="2C3E50", end_color="2C3E50", fill_type="solid") # Azul Grisáceo Oscuro
              color_header = PatternFill(start_color="D5D8DC", end_color="D5D8DC", fill_type="solid") # Gris Claro
              color_zebra  = PatternFill(start_color="F8F9F9", end_color="F8F9F9", fill_type="solid") # Blanco Humo
              border_style = Border(left=Side(style='thin'), right=Side(style='thin'), top=Side(style='thin'), bottom=Side(style='thin'))

              if os.path.exists(ex_p):
                  wb = load_workbook(ex_p)
                  ws = wb.active
              else:
                  wb = Workbook()
                  ws = wb.active
                  ws.title = "Auditoría"

              # 1. Fila de separación para que no esté todo pegado
              ws.append([])

              # 2. Encabezado del Servidor (Barra de título)
              ws.append(["SERVIDOR:", hn, "FECHA DE ESCANEO:", fecha])
              for cell in ws[ws.max_row]:
                  cell.font = Font(bold=True, color="FFFFFF", size=11)
                  cell.fill = color_server
                  cell.alignment = Alignment(horizontal="left")

              # 3. Encabezado de los datos
              ws.append(["", "ESTADO", "USUARIO", "GRUPOS / PERMISOS EN EL SISTEMA"])
              for cell in ws[ws.max_row]:
                  if cell.column > 1:
                      cell.font = Font(bold=True)
                      cell.fill = color_header
                      cell.border = border_style

              # 4. Listado de usuarios
              for linea in filas:
                  if ':' in linea:
                      user, groups = linea.split(':', 1)
                      # Heurística para resaltar admins
                      es_admin = any(g in groups.lower() for g in ['sudo', 'wheel', 'administrators', 'root'])
                      status = "ADMIN" if es_admin else "Normal"
                      
                      ws.append(["", status, user, groups if groups else "---"])
                      
                      curr_row = ws.max_row
                      for i in range(2, 5):
                          cell = ws.cell(row=curr_row, column=i)
                          cell.border = border_style
                          if curr_row % 2 == 0: cell.fill = color_zebra
                          if es_admin:
                              cell.font = Font(bold=True, color="C0392B") # Rojo oscuro para admins

              # 5. Ajuste de columnas para que se vea bien de entrada
              ws.column_dimensions['A'].width = 3
              ws.column_dimensions['B'].width = 12
              ws.column_dimensions['C'].width = 25
              ws.column_dimensions['D'].width = 70

              wb.save(ex_p)

          if __name__ == "__main__":
              run()

    - name: Ejecutar script para cada JSON
      ansible.builtin.shell: |
        [ -d {{ venv_path }} ] || python3 -m venv {{ venv_path }}
        {{ venv_path }}/bin/pip install openpyxl --quiet
        {{ venv_path }}/bin/python {{ script_python }} {{ ruta_excel }} {{ item }}
      with_fileglob:
        - "{{ ruta_json_ctl }}/info_*.json"

##########################################################
# 3) Copiar al recurso de red                            #
##########################################################
- name: Exportar Inventario Final
  hosts: localhost
  tasks:
    - name: Copiar Excel al Share
      become: true
      ansible.builtin.copy:
        src: "/home/semaphore/Excels/Inventario_Usuarios_Completo.xlsx"
        dest: "/mnt/ansible_share/Inventario_Usuarios.xlsx"
        mode: "0644"
        remote_src: true
