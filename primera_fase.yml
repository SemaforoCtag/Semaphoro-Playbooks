---
- name: Habilitar puerto SSH alternativo 45500
  hosts: all
  become: yes
  gather_facts: yes  # Necesitamos saber qué sistema es para el firewall

  tasks:
    - name: "Asegurar que SSH escucha en el puerto 22 y 45500"
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?Port 22"
        line: "Port 22\nPort 45500"
        state: present

    - name: "Intentar abrir puerto en Firewalld (RedHat/CentOS)"
      firewalld:
        port: 45500/tcp
        permanent: yes
        state: enabled
        immediate: yes
      when: ansible_os_family == "RedHat"
      ignore_errors: yes

    - name: "Intentar abrir puerto en UFW (Ubuntu/Debian)"
      command: ufw allow 45500/tcp
      when: ansible_os_family == "Debian"
      ignore_errors: yes

    - name: "REINICIAR SSH AHORA"
      service:
        name: ssh
        state: restarted
      # En algunos sistemas el servicio se llama 'sshd'
      ignore_errors: yes

    - name: "REINICIAR SSHD (por si el anterior falló)"
      service:
        name: sshd
        state: restarted
      ignore_errors: yes
