---
- name: Habilitar puerto SSH alternativo 45500
  hosts: all
  become: yes
  tasks:
    - name: "Asegurar que SSH escucha en el puerto 22 y 45500"
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?Port 22"
        line: "Port 22\nPort 45500"
        state: present
      notify: Reiniciar SSH

    - name: "Abrir puerto 45500 en el firewall (UFW - Ubuntu/Debian)"
      ufw:
        rule: allow
        port: '45500'
        proto: tcp
      when: ansible_os_family == "Debian"

    - name: "Abrir puerto 45500 en el firewall (Firewalld - RHEL/CentOS)"
      firewalld:
        port: 45500/tcp
        permanent: yes
        state: enabled
      when: ansible_os_family == "RedHat"

  handlers:
    - name: Reiniciar SSH
      service:
        name: ssh
        state: restarted
