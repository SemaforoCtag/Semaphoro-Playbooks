---
########################################################################
# 1. Recogida de datos MULTI-OS                                        #
########################################################################
- name: Auditoría Universal de Servidores Linux
  hosts: semaforos
  gather_facts: yes
  become: true

  vars:
    # Definimos las rutas una sola vez aquí para usarlas en todo el playbook
    dir_excels: "/home/semaphore/Excels"
    nombre_archivo: "Inventario_Sistemas_Completo.xlsx"
    ruta_excel_final: "/home/semaphore/Excels/Inventario_Sistemas_Completo.xlsx"
    ruta_json_remoto: "/tmp/info_{{ inventory_hostname }}.json"

  pre_tasks:
    - name: Limpiar temporales locales
      delegate_to: localhost
      run_once: true
      become: false
      ansible.builtin.shell: "rm -f {{ dir_excels }}/info_*.json {{ ruta_excel_final }}"
      ignore_errors: yes

    - name: Asegurar que la carpeta local existe
      ansible.builtin.file:
        path: "{{ dir_excels }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      run_once: true

  tasks:
    - name: Obtener modelo real de CPU
      ansible.builtin.shell: "grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | sed 's/^[ \t]*//'"
      register: cpu_model_detailed

    - name: Listar software (RedHat/Rocky/CentOS)
      ansible.builtin.shell: "rpm -qa --queryformat '%{NAME} (%{VERSION})\n' | sort"
      register: software_redhat
      when: ansible_os_family == "RedHat"

    - name: Listar software (Debian/Ubuntu)
      ansible.builtin.shell: "dpkg-query -W -f='${Package} (${Version})\n' | sort"
      register: software_debian
      when: ansible_os_family == "Debian"

    - name: Consolidar software
      ansible.builtin.set_fact:
        software_final: "{{ software_redhat.stdout_lines if ansible_os_family == 'RedHat' else software_debian.stdout_lines }}"

    - name: Puertos DB
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: "{{ item }}"
        timeout: 1
      register: db_ports
      ignore_errors: yes
      loop: [3306, 5432, 1433, 1521, 27017]

    - name: Crear JSON técnico
      ansible.builtin.copy:
        dest: "{{ ruta_json_remoto }}"
        content: |
          {
            "ip": "{{ inventory_hostname }}",
            "hostname": "{{ ansible_hostname }}",
            "os": "{{ ansible_distribution }} {{ ansible_distribution_version }}",
            "cpu": "{{ cpu_model_detailed.stdout }} ({{ ansible_processor_vcpus }} vCPUs)",
            "ram_total": "{{ (ansible_memtotal_mb / 1024) | round(2) }} GB",
            "ram_uso": "{{ ((ansible_memtotal_mb - ansible_memfree_mb) / 1024) | round(2) }} GB",
            "software": {{ software_final | to_json }},
            "db": {
               "mysql": {{ 'true' if db_ports.results[0].failed is not defined or not db_ports.results[0].failed else 'false' }},
               "postgres": {{ 'true' if db_ports.results[1].failed is not defined or not db_ports.results[1].failed else 'false' }},
               "sqlserver": {{ 'true' if db_ports.results[2].failed is not defined or not db_ports.results[2].failed else 'false' }},
               "oracle": {{ 'true' if db_ports.results[3].failed is not defined or not db_ports.results[3].failed else 'false' }},
               "mongo": {{ 'true' if db_ports.results[4].failed is not defined or not db_ports.results[4].failed else 'false' }}
            }
          }

    - name: Enviar al nodo control
      ansible.builtin.fetch:
        src: "{{ ruta_json_remoto }}"
        dest: "{{ dir_excels }}/"
        flat: true

########################################################################
# 2. LOCALHOST: Generación de Excel                                    #
########################################################################
- name: Consolidar Inventario en Excel
  hosts: localhost
  gather_facts: no
  vars:
    dir_excels: "/home/semaphore/Excels"
    ruta_excel_final: "/home/semaphore/Excels/Inventario_Sistemas_Completo.xlsx"
    script_python: "/home/semaphore/Excels/generar_excel_pro.py"

  tasks:
    - name: Crear Motor Python Pro
      ansible.builtin.copy:
        dest: "{{ script_python }}"
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import sys, os, json, glob
          from openpyxl import Workbook
          from openpyxl.styles import Font, PatternFill, Alignment, Border, Side

          def run():
              ex_path, j_dir = sys.argv[1], sys.argv[2]
              j_files = glob.glob(os.path.join(j_dir, "info_*.json"))
              wb = Workbook(); ws = wb.active; ws.title = "Inventario"

              h_fill = PatternFill(start_color="1F4E78", end_color="1F4E78", fill_type="solid")
              white_font = Font(color="FFFFFF", bold=True)
              
              headers = ["IP", "HOSTNAME", "SISTEMA", "CPU", "RAM TOTAL", "RAM USO", "MYSQL", "PGS", "SQL", "ORA", "MG", "SOFTWARE"]
              ws.append(headers)
              for cell in ws[1]:
                  cell.fill, cell.font, cell.alignment = h_fill, white_font, Alignment(horizontal="center")

              for f in sorted(j_files):
                  with open(f, 'r') as file:
                      d = json.load(file)
                  db = d.get('db', {})
                  row = [
                      d.get('ip'), d.get('hostname'), d.get('os'), d.get('cpu'),
                      d.get('ram_total'), d.get('ram_uso'),
                      "SI" if db.get('mysql') else "-", "SI" if db.get('postgres') else "-",
                      "SI" if db.get('sqlserver') else "-", "SI" if db.get('oracle') else "-",
                      "SI" if db.get('mongo') else "-", " | ".join(d.get('software', []))
                  ]
                  ws.append(row)
              
              ws.column_dimensions['L'].width = 100
              wb.save(ex_path)

          if __name__ == "__main__":
              run()

    - name: Ejecutar script de generación
      ansible.builtin.command: "python3 {{ script_python }} {{ ruta_excel_final }} {{ dir_excels }}"

########################################################################
# 3. EXPORTACIÓN FINAL                                                 #
########################################################################
- name: Publicar Inventario
  hosts: localhost
  tasks:
    - name: Copiar al Share
      become: true
      ansible.builtin.copy:
        # Usamos la ruta completa definida arriba
        src: "/home/semaphore/Excels/Inventario_Sistemas_Completo.xlsx"
        dest: "/mnt/ansible_share/Inventario_Sistemas_Completo.xlsx"
        mode: "0644"
        remote_src: true
